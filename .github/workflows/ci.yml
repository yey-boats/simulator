name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check src tests
      - run: uv run mypy
      - run: uv run pytest -q
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: uv build --wheel
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t yey-boats-simulator:ci .
      - name: run a few ticks via stdout sink and verify steady state
        run: |
          set -eu
          cid=$(docker run -d --entrypoint yey-boats-sim \
            -e DATA_DIR=/tmp yey-boats-simulator:ci \
            --sink stdout --no-failover)
          sleep 45
          echo "--- container logs ---"
          docker logs "$cid" || true

          running=$(docker inspect -f '{{.State.Running}}' "$cid")
          if [ "$running" != "true" ]; then
            echo "::error::container is not running after 45s (crashed/exited)"
            docker inspect -f 'status={{.State.Status}} exit={{.State.ExitCode}} error={{.State.Error}}' "$cid"
            docker rm -f "$cid" >/dev/null 2>&1 || true
            exit 1
          fi

          # "[sink] active: <name>" is printed once SinkChain.open() succeeds
          # (adapters/failover.py) — the steady-state marker for this smoke test.
          if ! docker logs "$cid" 2>&1 | grep -q '\[sink\] active:'; then
            echo "::error::container never reached steady state ([sink] active: marker not seen in logs)"
            docker rm -f "$cid" >/dev/null 2>&1 || true
            exit 1
          fi

          echo "container is running and reached steady state"
          docker rm -f "$cid"

  # Publish a multi-arch image to GHCR on every green push to main, so the lab
  # deployment can pull a fresh build (ghcr.io/yey-boats/simulator:latest|main|sha-<short>).
  # Versioned releases are still cut by release.yml on v* tags.
  publish-image:
    needs: [test, docker-smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=main
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
