name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check src tests
      - run: pytest -q
      - run: pip install build && python -m build --wheel
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t yey-boats-simulator:ci .
      - name: run a few ticks via stdout sink
        run: |
          docker run --rm --entrypoint yey-boats-sim \
            -e DATA_DIR=/tmp yey-boats-simulator:ci \
            --sink stdout --no-failover &
          sleep 45
          echo "smoke run launched (depth fetch dominates first run)"
