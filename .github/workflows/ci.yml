name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev]"
      - run: ruff check src tests
      - run: mypy
      - run: pytest -q
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: pip install build && python -m build --wheel
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t yey-boats-simulator:ci .
      - name: run a few ticks via stdout sink
        run: |
          docker run --rm --entrypoint yey-boats-sim \
            -e DATA_DIR=/tmp yey-boats-simulator:ci \
            --sink stdout --no-failover &
          sleep 45
          echo "smoke run launched (depth fetch dominates first run)"

  # Publish a multi-arch image to GHCR on every green push to main, so the lab
  # deployment can pull a fresh build (ghcr.io/yey-boats/simulator:latest|main|sha-<short>).
  # Versioned releases are still cut by release.yml on v* tags.
  publish-image:
    needs: [test, docker-smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=main
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
